<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px; color: #fff; }
  .badge { background: #1a1a1a; border: 1px solid #333; border-radius: 999px; padding: 8px 20px; font-size: 16px; color: #a1a1a1; margin-bottom: 40px; }
  h1 { font-size: 64px; font-weight: 800; text-align: center; line-height: 1.1; margin-bottom: 24px; }
  h1 span { background: linear-gradient(135deg, #a78bfa, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  p { font-size: 24px; color: #a1a1a1; text-align: center; line-height: 1.5; max-width: 700px; margin-bottom: 48px; }
  .cta { background: #fff; color: #0a0a0a; padding: 16px 40px; border-radius: 12px; font-size: 20px; font-weight: 700; }
  .logo { position: absolute; bottom: 60px; display: flex; align-items: center; gap: 10px; }
  .logo-box { background: #fff; color: #0a0a0a; width: 36px; height: 36px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; }
  .logo-text { font-size: 18px; font-weight: 600; color: #666; }
</style>
</head>
<body>
  <div class="badge">Stop Building From Scratch</div>
  <h1>Premium AI Workflows.<br><span>Deploy in Minutes.</span></h1>
  <p>20+ production-ready n8n templates with Claude AI built-in. Lead gen, content, e-commerce, support.</p>
  <div class="cta">Get Free Template →</div>
  <div class="logo">
    <div class="logo-box">FC</div>
    <span class="logo-text">flow-crate.com</span>
  </div>
</body>
</html>
